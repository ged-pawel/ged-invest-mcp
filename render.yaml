# Render.com — connect repo → New Blueprint → deploy.
# Demo/tests are excluded by .dockerignore; image ships src/ + pyproject only.
services:
  - type: web
    name: ged-invest-mcp
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: HOST
        value: 0.0.0.0
      - key: MCP_ALLOWED_HOSTS
        value: ged-invest-mcp.onrender.com,ged-invest-mcp.onrender.com:*
